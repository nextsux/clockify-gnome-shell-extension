<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Clock face -->
  <circle cx="64" cy="64" r="58" fill="#1a73e8" />
  <circle cx="64" cy="64" r="52" fill="#ffffff" />

  <!-- Hour markers -->
  <line x1="64" y1="16" x2="64" y2="24" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="104" x2="64" y2="112" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
  <line x1="16" y1="64" x2="24" y2="64" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>
  <line x1="104" y1="64" x2="112" y2="64" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>

  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="64" y1="64" x2="42" y2="40" stroke="#1a73e8" stroke-width="6" stroke-linecap="round"/>

  <!-- Minute hand (pointing ~12 o'clock) -->
  <line x1="64" y1="64" x2="64" y2="28" stroke="#1a73e8" stroke-width="4" stroke-linecap="round"/>

  <!-- Recording dot (active tracking indicator) -->
  <circle cx="90" cy="88" r="14" fill="#e53935" />
  <rect x="85" y="83" width="10" height="10" rx="1" fill="#ffffff"/>
</svg>
