name: CI

on:
  push:
  pull_request:

permissions: {}

env:
  UUID: clockify-tracker@smoula.net

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx eslint extension.js prefs.js

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libglib2.0-bin gettext zip
      - name: Build dist zip
        run: make dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.UUID }}-${{ github.sha }}
          path: dist/${{ env.UUID }}.zip

  # ── Release ───────────────────────────────────────────────────────────────────
  # Create a GitHub release and attach the zip on version tags (vN).
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.UUID }}-${{ github.sha }}
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.UUID }}.zip
          generate_release_notes: true

  # ── Publish ───────────────────────────────────────────────────────────────────
  # Upload to extensions.gnome.org on version tags (vN).
  # Requires repository secrets:
  #   EGO_USERNAME — your e.g.o account username
  #   EGO_PASSWORD — your e.g.o account password
  publish:
    name: Publish to e.g.o
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    environment: extensions.gnome.org
    steps:
      - uses: actions/checkout@v4
      - name: Package and upload to extensions.gnome.org
        uses: murar8/gnome-extensions-action@0.1.1
        with:
          source-dir: .
          schema: schemas/org.gnome.shell.extensions.clockify-tracker.gschema.xml
          podir: locale
          gettext-domain: clockify-tracker
          username: ${{ secrets.EGO_USERNAME }}
          password: ${{ secrets.EGO_PASSWORD }}
          accept-tos: true
