name: CI

on:
  push:
  pull_request:

env:
  UUID: clockify-tracker@smoula.net

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx eslint extension.js prefs.js

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libglib2.0-bin gettext zip
      - name: Build dist zip
        run: make dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.UUID }}-${{ github.sha }}
          path: dist/${{ env.UUID }}.zip
          retention-days: 90

  # ── Publish ───────────────────────────────────────────────────────────────────
  # Upload to extensions.gnome.org (manual trigger on version tags).
  # Requires repository secrets:
  #   EGO_USERNAME — your e.g.o account username
  #   EGO_PASSWORD — your e.g.o account password
  publish:
    name: Publish to e.g.o
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    environment: extensions.gnome.org
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libglib2.0-bin gettext zip
      - name: Build dist zip
        run: make dist
      - name: Install gnome-extension-uploader
        run: pip install gnome-extension-uploader
      - name: Upload to extensions.gnome.org
        run: geu publish --username "$EGO_USERNAME" --password "$EGO_PASSWORD" dist/$UUID.zip
        env:
          EGO_USERNAME: ${{ secrets.EGO_USERNAME }}
          EGO_PASSWORD: ${{ secrets.EGO_PASSWORD }}
