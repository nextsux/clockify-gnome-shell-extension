---
# GitLab CI/CD pipeline for the Clockify GNOME Shell Extension
#
# Stages:
#   lint    — static analysis (ESLint)
#   build   — compile schemas + create distributable zip
#   publish — upload to extensions.gnome.org (manual, on tags)

stages:
  - lint
  - build
  - publish

variables:
  UUID: "clockify-tracker@smoula.net"

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:eslint:
  stage: lint
  image: node:lts-alpine
  before_script:
    - npm ci
  script:
    - npx eslint extension.js prefs.js

# ── Build ─────────────────────────────────────────────────────────────────────

build:package:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache glib glib-dev gettext zip make
  script:
    - make dist
  artifacts:
    name: "$UUID-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/$UUID.zip
    expire_in: 30 days
  # Build on every push to any branch / tag
  rules:
    - when: always

# ── Publish ───────────────────────────────────────────────────────────────────
# Upload to extensions.gnome.org using gnome-extension-uploader (PyPI).
# Requires CI variables:
#   EGO_USERNAME — your e.g.o account username
#   EGO_PASSWORD — your e.g.o account password

publish:ego:
  stage: publish
  image: python:3-slim
  needs:
    - build:package
  before_script:
    - pip install gnome-extension-uploader
  script:
    - geu publish --username "$EGO_USERNAME" --password "$EGO_PASSWORD" dist/$UUID.zip
  rules:
    # Only run manually on version tags (e.g. v2, v3 — e.g.o uses integers)
    - if: '$CI_COMMIT_TAG =~ /^v\d+$/'
      when: manual
